<!doctype html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>إكمال الملف ٣/٣ — الأجر والنبذة</title>
<link rel="stylesheet" href="../assets/tokens.css"><link rel="stylesheet" href="../assets/base.css"><link rel="stylesheet" href="../assets/components.css">
<!-- SRS: FR-PROF-2 — أجر الساعة مع معاينة الصافي بعد العمولة، النبذة، الصورة، الموقع + شاشة الإكمال -->
</head>
<body style="background:var(--c-bg)">
<main class="container page-body" style="display:grid;gap:var(--sp-6);place-content:center">
  <div class="card card-pad-lg stack" style="max-width:760px;width:100%">
    <div class="wizard-progress"><span class="done"></span><span class="done"></span><span class="done"></span><span class="done"></span><span class="done"></span></div>
    <div>
      <h2>الأجر والنبذة والموقع</h2>
      <p class="muted small">الخطوة ٥ من ٥ — الأخيرة!</p>
    </div>
    <div class="grid-2">
      <div class="field"><label>أجر الساعة (د.ك) *</label><input class="input" value="١٥">
        <span class="hint">الصافي لك بعد عمولة المنصة (١٠٪): <b class="success-text">١٣٫٥٠ د.ك</b></span></div>
      <div class="field"><label>الموقع *</label><input class="input" value="الكويت — حولي"></div>
    </div>
    <div class="field"><label>عنوان مهني *</label><input class="input" value="مصمم واجهات وتجربة مستخدم UI/UX"></div>
    <div class="field"><label>النبذة *</label>
      <textarea class="textarea">مصمم UI/UX بخبرة ٨ سنوات في الهويات البصرية وواجهات المتاجر والتطبيقات. أركّز على تجربة المستخدم العربي وRTL سليم.</textarea>
      <span class="hint">٦٠ حرفًا على الأقل — تظهر في أعلى ملفك العام</span></div>
    <div class="field"><label>الصورة الشخصية</label>
      <div class="row"><div class="avatar avatar-lg">م‌أ</div><button class="btn btn-secondary btn-sm">رفع صورة</button><span class="caption">الافتراضية من جوجل — يمكن تغييرها</span></div></div>
    <div class="row-between">
      <button class="btn btn-ghost">رجوع</button>
      <button class="btn btn-primary btn-lg">إنهاء وإنشاء ملفي</button>
    </div>
  </div>

  <div class="card card-pad-lg stack center" style="max-width:760px;width:100%;align-items:center">
    <span style="font-size:52px">🎉</span>
    <h2>ملفك جاهز يا أحمد!</h2>
    <div class="progress" style="width:280px"><span style="width:90%"></span></div>
    <p class="small muted">اكتمال الملف ٩٠٪ — أضف نموذج أعمال لرفع فرص ظهورك</p>
    <div class="row wrap" style="justify-content:center">
      <button class="btn btn-primary">تصفّح الوظائف الآن</button>
      <button class="btn btn-secondary">🔔 اشترك في فئة «التصميم»</button>
      <button class="btn btn-ghost">إضافة معرض أعمال</button>
    </div>
  </div>
</main>
</body>
</html>
