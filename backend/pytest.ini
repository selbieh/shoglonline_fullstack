[pytest]
# `--ds` (a CLI option, highest precedence in pytest-django) pins the test settings
# even when the container exports DJANGO_SETTINGS_MODULE=config.settings.local. Without
# this, `docker compose exec backend pytest` runs against Postgres + the shared Redis
# cache with throttling ON, causing cross-test 429s and non-hermetic runs.
DJANGO_SETTINGS_MODULE = config.settings.test
python_files = test_*.py
testpaths = tests
# --cov-fail-under=90 enforces the overall gate (Part 02). Running a SUBSET of tests will
# under-report coverage and trip it — pass --no-cov for inner-loop slice runs.
addopts = -q --no-header --ds=config.settings.test --cov=apps --cov-report=term-missing --cov-fail-under=90
markers =
    unit: isolated business-logic / service tests (no DB or with a thin DB)
    integration: endpoint + multi-service flows over the API
    tasks: Celery task behavior (run eager, freeze time)
    db: database constraint / index / locking tests
    security: authz matrix, self-dealing (BR-21), authentication
    contracts_api: OpenAPI / response-shape contract tests
    regression: locks in a fixed bug (paired with the issue it covers)
    load: out-of-gate performance / load smoke (skipped on the PR gate)
    srs: tags a test with the SRS ref it satisfies (feeds the §11 matrix)
