# ShoghlOnline — SERVER stack.
# Differences from the local docker-compose.yml:
#   1. No `redis` service — we REUSE the Redis already running on the server. App containers
#      join that Redis's Docker network (REDIS_NETWORK) and reach it by container name `redis`.
#      Keys are namespaced by REDIS_PREFIX (default "shogl"), so sharing one Redis is safe.
#   2. Postgres publishes on host port 5433 (the server's existing db already owns 5432). The
#      port INSIDE the container stays 5432, so DATABASE_URL is unchanged.
#
# Run it with either:
#     docker compose -f docker-compose.server.yml up -d --build
# or set `COMPOSE_FILE=docker-compose.server.yml` in .env and just `docker compose up -d --build`.
#
# REQUIRED: set REDIS_NETWORK in .env to the Docker network the shared redis is attached to.
# Find it with:  docker inspect redis -f '{{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}'
services:
  db:
    image: postgres:17-alpine            # matches the server's existing postgres major
    environment:
      POSTGRES_DB: shoghl
      POSTGRES_USER: shoghl
      POSTGRES_PASSWORD: shoghl
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shoghl"]
      interval: 5s
      retries: 10
    ports:
      - "5433:5432"                       # host 5433 → container 5432 (avoids the existing db on 5432)

  backend:
    build:
      context: ./backend
      args: { REQUIREMENTS: requirements/local.txt }
    command: python manage.py runserver 0.0.0.0:8000
    env_file: [.env]
    environment: &backend_env
      DJANGO_SETTINGS_MODULE: config.settings.local
      DATABASE_URL: postgres://shoghl:shoghl@db:5432/shoghl   # internal port stays 5432
      # `redis` resolves to the shared container over REDIS_NETWORK. The shared instance requires
      # AUTH — REDIS_PASSWORD is read from .env (kept out of git). REDIS_PREFIX (default "shogl")
      # namespaces every key, so sharing these DBs with the other project is collision-safe.
      CACHE_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - ./backend:/app
      # Named volumes (not host dirs) for the paths the app must WRITE to. The bind mount above
      # shadows the image's app-owned /app/staticfiles & /app/media with host dirs the unprivileged
      # `app` user can't write — these writable volumes (chowned to app by the entrypoint) fix the
      # collectstatic PermissionError and persist uploads across deploys.
      - staticfiles:/app/staticfiles
      - media:/app/media
    networks: [default, shared_redis]
    ports:
      - "8000:8000"
    depends_on:
      db: { condition: service_healthy }

  worker:
    build:
      context: ./backend
      args: { REQUIREMENTS: requirements/local.txt }
    command: celery -A config worker -l info
    entrypoint: []
    env_file: [.env]
    environment: *backend_env
    volumes:
      - ./backend:/app
      - media:/app/media          # share uploads with backend (attachment sweeper, etc.)
    networks: [default, shared_redis]
    depends_on:
      backend: { condition: service_started }

  beat:
    build:
      context: ./backend
      args: { REQUIREMENTS: requirements/local.txt }
    command: celery -A config beat -l info
    entrypoint: []
    env_file: [.env]
    environment: *backend_env
    volumes:
      - ./backend:/app
    networks: [default, shared_redis]
    depends_on:
      backend: { condition: service_started }

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      INTERNAL_API_URL: http://backend:8000/api/v1
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
    volumes:
      - ./frontend:/app
      - frontend_modules:/app/node_modules
    ports:
      - "3000:3000"

networks:
  default:
  # The pre-existing network the shared Redis is on. Must already exist (external).
  shared_redis:
    external: true
    name: ${REDIS_NETWORK:?set REDIS_NETWORK in .env to the docker network of the shared redis}

volumes:
  pgdata:
  staticfiles:
  media:
  frontend_modules:
