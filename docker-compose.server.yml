services:
  db:
    image: postgres:17-alpine            # matches the server's existing postgres major
    # Postgres parallel workers allocate shared-memory segments under /dev/shm.
    # Docker's default 64 MB is too small and surfaces as the misleading
    # "could not resize shared memory segment ... No space left on device"
    # error on parallel scans/sorts. Bump it so parallel queries have room.
    shm_size: 256m
    environment:
      POSTGRES_DB: shoghl
      POSTGRES_USER: shoghl
      POSTGRES_PASSWORD: shoghl
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shoghl"]
      interval: 5s
      retries: 10
    ports:
      - "127.0.0.1:5433:5432"                       # host 5433 → container 5432 (avoids the existing db on 5432)

  backend:
    build:
      context: ./backend
      args: { REQUIREMENTS: requirements/local.txt }
    command: python manage.py runserver 0.0.0.0:8000
    env_file: [.env]
    environment: &backend_env
      DJANGO_SETTINGS_MODULE: config.settings.local
      DATABASE_URL: postgres://shoghl:shoghl@db:5432/shoghl   # internal port stays 5432
      # `redis` resolves to the shared container over REDIS_NETWORK. The shared instance requires
      # AUTH — REDIS_PASSWORD is read from .env (kept out of git). REDIS_PREFIX (default "shogl")
      # namespaces every key, so sharing these DBs with the other project is collision-safe.
      CACHE_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/0
      # Admin is served behind the HTTPS proxy at this domain; Django's CSRF rejects the login
      # POST unless the browser's Origin is listed here ("Origin checking failed"). Comma-separate
      # to add more. The JWT API is unaffected — it never uses CSRF.
      CSRF_TRUSTED_ORIGINS: https://shoglonline.bedoonsemsar.com
    volumes:
      - ./backend:/app
      # Named volumes (not host dirs) for the paths the app must WRITE to. The bind mount above
      # shadows the image's app-owned /app/staticfiles & /app/media with host dirs the unprivileged
      # `app` user can't write — these writable volumes (chowned to app by the entrypoint) fix the
      # collectstatic PermissionError and persist uploads across deploys.
      - staticfiles:/app/staticfiles
      - media:/app/media
    networks: [default, shared_redis]
    ports:
      - "127.0.0.1:4000:8000"
    depends_on:
      db: { condition: service_healthy }

  worker:
    build:
      context: ./backend
      args: { REQUIREMENTS: requirements/local.txt }
    command: celery -A config worker -l info
    entrypoint: []
    env_file: [.env]
    environment: *backend_env
    volumes:
      - ./backend:/app
      - media:/app/media          # share uploads with backend (attachment sweeper, etc.)
    networks: [default, shared_redis]
    depends_on:
      backend: { condition: service_started }

  beat:
    build:
      context: ./backend
      args: { REQUIREMENTS: requirements/local.txt }
    command: celery -A config beat -l info
    entrypoint: []
    env_file: [.env]
    environment: *backend_env
    volumes:
      - ./backend:/app
    networks: [default, shared_redis]
    depends_on:
      backend: { condition: service_started }

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # NEXT_PUBLIC_* are inlined at build time. Canonical/OG/sitemap/robots all derive from
      # SITE_URL — if it's absent the build bakes in http://localhost:3000 (deindex risk).
      args:
        NEXT_PUBLIC_API_URL: https://shoglonline.bedoonsemsar.com/api/v1
        NEXT_PUBLIC_SITE_URL: https://shoglonline.bedoonsemsar.com
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
        NEXT_PUBLIC_SOCIAL_LINKS: ${NEXT_PUBLIC_SOCIAL_LINKS:-}
        NEXT_PUBLIC_GA_ID: ${NEXT_PUBLIC_GA_ID:-}        # GA4 Measurement ID (G-XXXXXXXXXX); empty → analytics off
        NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION: ${NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION:-}  # Search Console HTML-tag token
        NEXT_PUBLIC_BING_SITE_VERIFICATION: ${NEXT_PUBLIC_BING_SITE_VERIFICATION:-}      # Bing Webmaster token
    environment:
      # Read at runtime by server components (SSR fetch to backend over the compose network).
      INTERNAL_API_URL: http://backend:8000/api/v1
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"

networks:
  default:
  # The pre-existing network the shared Redis is on. Must already exist (external).
  shared_redis:
    external: true
    name: ${REDIS_NETWORK:?set REDIS_NETWORK in .env to the docker network of the shared redis}

volumes:
  pgdata:
  staticfiles:
  media:
  frontend_modules: