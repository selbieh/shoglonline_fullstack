name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 3 * * *"  # nightly: full suite incl. @regression + load smoke (Part 11 step 13)

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: backend }
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: shoghl
          POSTGRES_USER: shoghl
          POSTGRES_PASSWORD: shoghl
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U shoghl"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Run the suite against Postgres so DB-level constraints/locks are exercised (not just
      # sqlite). config/settings/test.py reads this; it stays unset locally → in-memory sqlite.
      TEST_DATABASE_URL: postgres://shoghl:shoghl@localhost:5432/shoghl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: pip install -r requirements/local.txt
      - name: Lint (ruff)
        run: python -m ruff check .
      - name: Migration check
        run: DJANGO_SETTINGS_MODULE=config.settings.test python manage.py makemigrations --check --dry-run
      - name: Tests
        # --cov=apps + --cov-fail-under=90 are in pytest.ini (the PR gate). Slow load tests are
        # excluded from the PR gate (Part 11 step 14); they run nightly.
        run: python -m pytest -n auto --cov-report=xml -m "not load"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: frontend }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm install
      - name: Type check
        run: npx tsc --noEmit
      - name: Unit tests + coverage gate (Vitest)
        run: npm run test:cov
      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  security:
    # Dependency + secret + image scanning every build; fail on HIGH severity (Part 10 step 8 / SEC).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - name: Python dependency audit (pip-audit)
        working-directory: backend
        run: |
          pip install pip-audit
          pip-audit -r requirements/base.txt --strict
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Node dependency audit (npm audit)
        working-directory: frontend
        run: npm audit --audit-level=high
      - name: Image/filesystem vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  e2e:
    # Golden-journey Playwright run against the stubbed docker stack (Part 11 step 12). Runs on PR
    # and nightly; traces/videos uploaded on failure.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bring up the stack (stubs on)
        run: |
          cp .env.example .env
          docker compose up -d --build db redis backend frontend
      - name: Wait for backend + frontend
        # The backend entrypoint runs migrate + seed_{settings,catalog,landing} before serving, so a
        # 200 on a public API route proves the DB is migrated and seeded; the frontend wait gates the run.
        run: |
          npx --yes wait-on http://localhost:8000/api/v1/jobs --timeout 180000
          npx --yes wait-on http://localhost:3000 --timeout 180000
      - name: Backend logs (boot)
        run: docker compose logs --tail=40 backend
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Install Playwright + browsers
        working-directory: frontend
        run: |
          npm install
          npx playwright install --with-deps chromium
      - name: Run E2E
        working-directory: frontend
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
      - name: Upload traces/videos on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/

  nightly:
    # Full belt-and-braces run on the nightly schedule: regression + load smoke (Part 11 step 13).
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: backend }
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_DB: shoghl, POSTGRES_USER: shoghl, POSTGRES_PASSWORD: shoghl }
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U shoghl" --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://shoghl:shoghl@localhost:5432/shoghl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: pip install -r requirements/local.txt
      - name: Full suite incl. regression + load
        run: python -m pytest -n auto -m "regression or load or db" --no-cov
